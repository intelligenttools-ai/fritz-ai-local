version: 1

# Vault registry — edit paths for your machine.
# Each vault gets a .brain/ overlay without restructuring existing folders.

# Default vault for captures when cwd doesn't match any vault.
default_vault: my-vault

# Global settings (all optional, shown with defaults)
settings:
  # Context injection: off | light | full (default: off)
  # - off: advisory "BRAIN CHECK" reminder only
  # - light: hook searches knowledge dirs, injects matching file paths
  # - full: light + agent must spawn subagent to read/synthesize
  # context_injection: off

  # Max characters for context injection output (default: 8000)
  # max_injection_chars: 8000

  # Check for Fritz Local updates on session start (default: true)
  # update_check: true

  # Optional Dockerized Local Brain service. Disabled by default.
  # When enabled and reachable, hooks and skills route supported workflows
  # (query, compile, sync, lint, embeddings) through the service first.
  # When disabled or unreachable, agents fall back to the original local skills.
  local_brain_service:
    enabled: false
    base_url: http://127.0.0.1:8765
    # Agents resolve the API token from api_token first, then api_token_env.
    # Use api_token on trusted local machines when agents should call the
    # service without manual shell env setup.
    # api_token: replace-with-random-token
    api_token_env: LOCAL_BRAIN_API_TOKEN
    allow_remote: false
    # When enabled, capture/ingest hooks trigger an apply-mode compile attempt after saving.
    auto_compile_on_ingest: true
    # Service scheduler settings live in the service environment (.env):
    # SCHEDULER_ENABLED=false, SCHEDULER_DRY_RUN=true, AUTOSTART_INSTALLED=false.
    suggest_setup: true

vaults:
  my-vault:
    path: ~/Notes/MyVault
    domain: work
    sync: affine
    # affine_workspace_id: "<your-workspace-id>"

  work:
    path: ~/Notes/Work
    domain: work
    sync: local

  personal:
    path: ~/Notes/Personal
    domain: personal
    sync: local

  engineering:
    path: ~/Notes/Engineering
    domain: engineering
    sync: affine

  research:
    path: ~/Notes/Research
    domain: research
    sync: local
