version: 1

# Vault registry — edit paths for your machine.
# Each vault gets a .brain/ overlay without restructuring existing folders.

# Default vault for captures when cwd doesn't match any vault.
default_vault: my-vault

# Global settings (all optional, shown with defaults)
settings:
  # Context injection: off | light | full (default: off)
  # - off: advisory "BRAIN CHECK" reminder only
  # - light: hook searches knowledge dirs, injects matching file paths
  # - full: light + agent must spawn subagent to read/synthesize
  # context_injection: off

  # Max characters for context injection output (default: 8000)
  # max_injection_chars: 8000

  # Check for Fritz Local updates on session start (default: true)
  # update_check: true

  # Optional Dockerized Local Brain service. Disabled by default.
  # When enabled and reachable, hooks and skills route supported workflows
  # (query, compile, sync, lint, embeddings) through the service first.
  # When disabled or unreachable, agents fall back to the original local skills.
  local_brain_service:
    enabled: false
    base_url: http://127.0.0.1:8765
    # Agents resolve the API token from api_token first, then api_token_env.
    # Use api_token on trusted local machines when agents should call the
    # service without manual shell env setup.
    # api_token: replace-with-random-token
    api_token_env: LOCAL_BRAIN_API_TOKEN
    allow_remote: false
    # When enabled, capture/ingest hooks trigger an apply-mode compile attempt after saving.
    auto_compile_on_ingest: true
    # Service scheduler settings live in the service environment (.env):
    # SCHEDULER_ENABLED=false, SCHEDULER_DRY_RUN=true, AUTOSTART_INSTALLED=false.
    suggest_setup: true
    # Declare the desired runtime: docker | local (default: local).
    # When set to "docker", session-start will inject a MUST-run instruction for
    # /fritz:brain-service-setup if the service is not currently operational —
    # even when enabled: false is recorded.  Set to "local" (or omit) to suppress
    # all forcing prompts and use the original local slash-skill workflow.
    # desired: docker

# External targets (service mode only; additive — the brain store works without this).
# The registry now includes "external targets": other vaults, MCPs, shared drives,
# or off-site systems that the optional Docker service mirrors INTO the brain store.
# Mirror execution is performed by the Docker mirror agent; absence is not an error.
# Supported kinds: local-vault | mcp | drive | offsite
# Supported mirror_mode values: index-only | full-summary  (default: index-only)
#
# external_targets:
#   team-vault:
#     kind: local-vault          # local-vault | mcp | drive | offsite
#     connection: ~/Notes/TeamVault
#     mirror_mode: full-summary  # index-only | full-summary
#   team-mcp:
#     kind: mcp
#     connection: mcp://obsidian-bridge
#     auth: OBSIDIAN_MCP_TOKEN   # env var name (resolved by the service, not here)
#     mirror_mode: index-only
#   shared-drive:
#     kind: drive
#     connection: /mnt/shared/knowledge
#     mirror_mode: index-only
#   offsite-affine:
#     kind: offsite
#     connection: https://affine.example.com/workspace/<id>
#     auth: AFFINE_TOKEN
#     mirror_mode: full-summary

vaults:
  my-vault:
    path: ~/Notes/MyVault
    domain: work
    sync: affine
    # affine_workspace_id: "<your-workspace-id>"

  work:
    path: ~/Notes/Work
    domain: work
    sync: local

  personal:
    path: ~/Notes/Personal
    domain: personal
    sync: local

  engineering:
    path: ~/Notes/Engineering
    domain: engineering
    sync: affine

  research:
    path: ~/Notes/Research
    domain: research
    sync: local
