version: 1

# Vault registry — edit paths for your machine.
# Each vault gets a .brain/ overlay without restructuring existing folders.

# Default vault for captures when cwd doesn't match any vault.
# Every conversation gets captured, regardless of where it happens.
default_vault: vanillacore

vaults:
  vanillacore:
    path: ~/Notes/VanillaCore
    domain: work
    sync: affine
    # affine_workspace_id: "<your-workspace-id>"

  work:
    path: ~/Notes/Work
    domain: work
    sync: local

  privat:
    path: ~/Notes/Privat
    domain: personal
    sync: local

  engineering:
    path: ~/Notes/Engineering
    domain: engineering
    sync: affine

  ai-agents:
    path: ~/Notes/AI-Agents-Hermes
    domain: research
    sync: local
