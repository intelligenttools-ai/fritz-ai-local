services:
  local-brain:
    build:
      context: ../..
      dockerfile: services/local-brain/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8765}
      API_TOKEN: ${API_TOKEN:-}
      LLM_PROTOCOL: ${LLM_PROTOCOL:-openai-compatible}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-local-instruct-model}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-false}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://host.docker.internal:11434/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text:latest}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      BRAIN_HOME: /data/brain
      SKILLS_DIR: /app/skills
      BRAIN_PATH_MAP: ${BRAIN_PATH_MAP:-}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      SCHEDULER_DRY_RUN: ${SCHEDULER_DRY_RUN:-true}
      AUTOSTART_INSTALLED: ${AUTOSTART_INSTALLED:-false}
      BRAIN_INTERVAL_MINUTES: ${BRAIN_INTERVAL_MINUTES:-30}
      CAPTURE_MAX_CHARS: ${CAPTURE_MAX_CHARS:-4000}
      COMPILE_MAX_CAPTURES: ${COMPILE_MAX_CAPTURES:-25}
      ALLOW_FIRST_EXTERNAL_SYNC: ${ALLOW_FIRST_EXTERNAL_SYNC:-false}
      APPROVAL_TOKEN: ${APPROVAL_TOKEN:-}
      LARGE_BATCH_THRESHOLD: ${LARGE_BATCH_THRESHOLD:-10}
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${HOME}/.brain:/data/brain
      - ${HOME}/Notes:/vaults/notes
