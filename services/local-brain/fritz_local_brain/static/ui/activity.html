<!DOCTYPE html>
<!--
  Fritz Local Brain — Activity page (#220 app shell).
  Activity-over-time chart (with the #207 by type/agent/vault toggle), the
  system-activity panel (#205) and SSE live tail (#198). Deep-linkable at
  /ui/activity.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fritz Brain — Activity</title>
<link rel="stylesheet" href="/ui/shared/app.css">
</head>
<body data-page="activity">

<div id="loading"></div>

<div id="auth-overlay">
  <div id="auth-box">
    <h2>Fritz Brain Dashboard</h2>
    <p>Enter the API Bearer token to load usage data.</p>
    <input type="password" id="token-input" placeholder="Bearer token" autofocus>
    <button onclick="saveToken()">Continue</button>
    <div id="auth-error">Invalid token — please try again.</div>
  </div>
</div>

<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content">
    <header>
      <h1>Fritz Brain</h1>
      <span class="subtitle">Activity</span>
      <div class="header-controls">
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>
        <button id="refresh-btn" onclick="manualRefresh()">Refresh</button>
        <select id="auto-refresh-select" onchange="onIntervalChange()">
          <option value="0">Auto-refresh: off</option>
          <option value="15">Every 15s</option>
          <option value="30" selected>Every 30s</option>
          <option value="60">Every 60s</option>
        </select>
        <select id="agent-filter-select" onchange="onAgentFilterChange()">
          <option value="">All agents</option>
        </select>
        <span id="last-updated"></span>
      </div>
    </header>

    <main>
      <!-- Activity over time (#207 toggle) -->
      <h2>Activity over time</h2>
      <div class="section panel">
        <div class="toggle-group" id="activity-by-toggle">
          <button class="active" data-by="type" onclick="setActivityBy('type',this)">by type</button>
          <button data-by="agent" onclick="setActivityBy('agent',this)">by agent</button>
          <button data-by="vault" onclick="setActivityBy('vault',this)">by vault</button>
        </div>
        <div id="activity-chart"><div class="skeleton skel-chart"></div></div>
      </div>

      <!-- System activity (#205): the service's own scheduler work, NOT an agent -->
      <h2>System activity <span class="system-tag">service, not an agent</span></h2>
      <div class="section panel" id="system-panel">
        <div id="system-activity"><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div></div>
      </div>
    </main>
  </div>
</div>

<div class="chart-tip" id="chart-tip"></div>

<script src="/ui/shared/api.js"></script>
<script src="/ui/shared/sse.js"></script>
<script src="/ui/shared/nav.js"></script>
<script>
// Activity page: activity time-series with the #207 grouping toggle, the #205
// system-activity panel, and the SSE live tail (a `changed` frame refreshes).

let _activityBy = "type";

// #199 drill-down: the header agent-filter scopes the activity timeline (as the
// old dashboard did). Empty string = "All agents". Discovered dynamically from
// /v1/usage/agents — never a hardcoded enum.
let _agentFilter = "";

/** Build the agent param map for the activity fetch (empty when "All agents"). */
function agentParams() {
  return _agentFilter ? { agent: _agentFilter } : {};
}

/** Populate the agent selector from the live /v1/usage/agents discovery list. */
function populateAgentFilter(data) {
  const sel = document.getElementById("agent-filter-select");
  if (!sel) return;
  const agents = (data && Array.isArray(data.agents)) ? data.agents : [];
  // esc() every agent id — telemetry-stored, untrusted (stored XSS guard).
  let html = '<option value="">All agents</option>';
  for (const a of agents) {
    const id = esc(a.agent);
    html += `<option value="${id}">${id} (${a.count ?? 0})</option>`;
  }
  sel.innerHTML = html;
  const present = agents.some(a => a.agent === _agentFilter);
  if (_agentFilter && !present) _agentFilter = "";
  sel.value = _agentFilter;
}

function onAgentFilterChange() {
  _agentFilter = document.getElementById("agent-filter-select").value;
  loadAll();
}

async function setActivityBy(by, btn) {
  _activityBy = by;
  document.querySelectorAll("#activity-by-toggle button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  await loadActivity();
}

async function loadActivity() {
  const data = await apiFetch("/v1/usage/activity", { by: _activityBy, ...agentParams() });
  if (!data) { renderError("activity-chart", "Could not load activity."); return; }
  renderTimeChart("activity-chart", data.buckets);
}

/** Render the System activity panel from /v1/usage/system (service, not agent). */
function renderSystem(data) {
  const el = document.getElementById("system-activity");
  if (data === null) { renderError("system-activity", "Could not load system activity."); return; }
  const byType = (data && data.by_type) || {};
  const total = (data && data.total) || 0;
  if (!total) {
    el.innerHTML = '<div class="no-data">No system activity yet.</div>';
    return;
  }
  const rate = (data.success_rate == null) ? "—"
    : (Math.round(data.success_rate * 1000) / 10) + "%";
  const rateClass = (data.success_rate == null) ? ""
    : (data.success_rate >= 0.95 ? "sys-rate-ok" : "sys-rate-warn");
  const rows = Object.entries(byType)
    .sort((a, b) => b[1].total - a[1].total)
    .map(([type, s]) => `<tr>
      <td>${esc(type)}</td>
      <td class="num">${s.total}</td>
      <td class="num">${s.ok}</td>
      <td class="num">${s.error}</td>
    </tr>`).join("");
  el.innerHTML = `
    <div class="latency-row" style="margin-bottom:.85rem">
      <div class="lat-card"><div class="label">System events</div><div class="value">${total}</div></div>
      <div class="lat-card"><div class="label">OK</div><div class="value">${data.ok || 0}</div></div>
      <div class="lat-card"><div class="label">Errors</div><div class="value">${data.error || 0}</div></div>
      <div class="lat-card"><div class="label">Success rate</div><div class="value ${rateClass}">${rate}</div></div>
    </div>
    <table>
      <thead><tr><th>Event type</th><th class="num">Total</th><th class="num">OK</th><th class="num">Error</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadAll() {
  if (_inFlight) return;
  _inFlight = true;
  document.getElementById("last-updated").textContent = "Loading…";

  // Activity is agent-scoped when a specific agent is selected. The agents
  // discovery list is always global so the selector shows every agent. System
  // activity is the service's own work — always global, never agent-scoped.
  const ap = agentParams();
  const [agents, activity, system] = await Promise.all([
    apiFetch("/v1/usage/agents"),
    apiFetch("/v1/usage/activity", { by: _activityBy, ...ap }),
    apiFetch("/v1/usage/system"),
  ]);

  _inFlight = false;
  if (!getToken()) return;

  populateAgentFilter(agents);
  if (!activity) { renderError("activity-chart", "Could not load activity."); }
  else { renderTimeChart("activity-chart", activity.buckets); }
  renderSystem(system);

  _lastUpdatedAt = new Date();
  renderLastUpdated();
}
</script>
</body>
</html>
